name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (Eleventy)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Verify build output
        run: |
          test -d _site || (echo "Build output missing" && exit 1)
          test -f _site/index.html || (echo "index.html missing" && exit 1)
          test -f _site/coleccion/index.html || (echo "coleccion page missing" && exit 1)
          PAGES=$(find _site -name "*.html" | wc -l)
          echo "Built $PAGES HTML pages"
          test "$PAGES" -ge 10 || (echo "Too few pages generated ($PAGES < 10)" && exit 1)

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: web/_site
          retention-days: 7

  link-check:
    name: Internal link check
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: site
          path: _site

      - name: Run lychee link checker
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --offline
            --no-progress
            --exclude-mail
            --base _site
            _site/**/*.html
          fail: true
